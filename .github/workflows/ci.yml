name: CI - Entrenamiento y Validación

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  train-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: make install

      - name: Entrenar modelo
        run: make train

      - name: Validar modelo
        run: make validate

      - name: Subir artefactos MLflow
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: mlruns